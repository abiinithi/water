server.port=8083
spring.application.name=billing-service

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=water-billing-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

# Crucial: Allow Jackson to deserialize the shared DTO class path safely
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.water.dto
water.kafka.billing-request-topic=water-billing-requests
water.kafka.billing-consumer-group=water-billing-group